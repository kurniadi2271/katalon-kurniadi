name: Katalon CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  katalon-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install System Dependencies
        run: |
          echo "=== Installing system dependencies ==="
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libgbm1 \
            libxss1 \
            libappindicator1 \
            libindicator7 \
            fonts-liberation \
            libnss3 \
            libxslt1.1 \
            curl \
            wget

      - name: Download Katalon Engine
        run: |
          echo "=== Downloading Katalon Studio Engine 11.1.1 ==="
          cd $HOME
          wget -q https://download.katalon.com/11.1.1/Katalon_Studio_Engine_Linux_64-11.1.1.tar.gz
          echo "✓ Download completed"
          
          echo "=== Extracting Katalon Engine ==="
          tar -xzf Katalon_Studio_Engine_Linux_64-11.1.1.tar.gz
          ls -la
          echo "✓ Extraction completed"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify Project Structure
        run: |
          echo "=== Verifying Project Structure ==="
          pwd
          echo ""
          echo "Project files:"
          ls -la
          echo ""
          echo "Looking for test suites:"
          find . -path "*/Test Suites/*" -name "*.ts" 2>/dev/null || echo "No test suites found"
          echo ""
          echo "Looking for .prj file:"
          find . -name "*.prj" 2>/dev/null || echo "No .prj file found"

      - name: Run Katalon Test
        run: |
          echo "=== Starting Katalon Test Execution ==="
          echo "Current directory: $(pwd)"
          echo "Katalon Engine location: $HOME/Katalon_Studio_Engine_Linux_64-11.1.1"
          echo ""
          
          xvfb-run --auto-servernum \
            $HOME/Katalon_Studio_Engine_Linux_64-11.1.1/katalonc \
            -noSplash \
            -runMode=console \
            -consoleLog \
            -projectPath="$GITHUB_WORKSPACE/tugas6-katalon.prj" \
            -testSuitePath="Test Suites/TC_LOGIN" \
            -browserType="Chrome (headless)" \
            -executionProfile="default" \
            -apiKey="${{ secrets.KATALON_API_KEY }}" \
            --config \
            -webui.autoUpdateDrivers=true \
            -Djava.awt.headless=true \
            -Dkatalon.ignore_ssl=true
        env:
          DISPLAY: :99

      - name: Check Execution Logs
        if: always()
        run: |
          echo "=== Checking Katalon Logs ==="
          if [ -f "$HOME/.katalon/11.1.1/Katalon_Studio_Engine_Linux_64-11.1.1/configuration/"*.log ]; then
            echo "Katalon configuration logs:"
            cat "$HOME/.katalon/11.1.1/Katalon_Studio_Engine_Linux_64-11.1.1/configuration/"*.log
          fi
          
          if [ -d "Reports" ]; then
            echo ""
            echo "Report files found:"
            find Reports -type f
          fi

      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: katalon-report
          path: Reports/
          retention-days: 30

      - name: Prepare GitHub Pages
        if: always()
        run: |
          mkdir -p public
          
          # Try to find and copy report.html
          if find Reports -name "report.html" -type f 2>/dev/null | head -1 | xargs -I {} cp {} public/index.html 2>/dev/null; then
            echo "✓ Report found and copied successfully"
          else
            echo "Report not found, creating fallback page..."
            cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Katalon Test Report</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; }
              .status { padding: 20px; border-radius: 5px; }
              .error { background-color: #f8d7da; color: #721c24; }
            </style>
          </head>
          <body>
            <h1>Katalon Test Execution Report</h1>
            <div class="status error">
              <p>❌ Report generation failed or tests did not complete</p>
              <p>Please check the Artifacts section for detailed logs</p>
            </div>
          </body>
          </html>
          EOF
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: always()

      - name: Test Result Summary
        if: always()
        run: |
          echo "=== Execution Summary ==="
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Workflow: ${{ github.workflow }}"
          echo ""
          echo "✓ Test execution completed"
          echo "✓ Check GitHub Pages for report: ${{ steps.deployment.outputs.page_url }}"