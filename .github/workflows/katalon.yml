name: Katalon CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  katalon-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Katalon Studio GitHub Action
        uses: katalon-studio/katalon-studio-github-action@v4.0
        with:
          version: '11.1.1'
          projectPath: '${{ github.workspace }}'
          args: >-
            -noSplash
            -retry=0
            -testSuitePath="Test Suites/TC_LOGIN"
            -browserType="Chrome (headless)"
            -executionProfile="default"
            -apiKey=${{ secrets.KATALON_API_KEY }}
            --config -webui.autoUpdateDrivers=true

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: katalon-report
          path: Reports/

      - name: Prepare GitHub Pages
        if: always()
        run: |
          mkdir -p public
          if [ -f "Reports/report.html" ]; then
            cp Reports/report.html public/index.html
          else
            echo "<h1>Test Report</h1><p>No report generated</p>" > public/index.html
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: public

  deploy-pages:
    needs: katalon-test
    runs-on: ubuntu-latest
    if: always()

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4