name: Katalon CI Manual

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  katalon-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download Katalon Engine
        run: |
          echo "Downloading Katalon Studio Engine 11.1.1..."
          wget https://download.katalon.com/11.1.1/Katalon_Studio_Engine_Linux_64-11.1.1.tar.gz
          echo "Extracting..."
          tar -xzf Katalon_Studio_Engine_Linux_64-11.1.1.tar.gz
          ls -la

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          echo "Installing system dependencies..."
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libgbm1

      - name: List Project Structure
        run: |
          echo "=== Project Structure ==="
          find . -type f -name "*.ts" | head -20
          echo ""
          echo "=== Looking for test suites ==="
          find . -path "*/Test Suites/*" -name "*.ts"

      - name: Run Katalon Test
        run: |
          echo "Starting Katalon test execution..."
          xvfb-run --auto-servernum ./Katalon_Studio_Engine_Linux_64-11.1.1/katalonc \
            -noSplash \
            -clean \
            -runMode=console \
            -consoleLog \
            -projectPath="$GITHUB_WORKSPACE/tugas6-katalon.prj" \
            -retry=0 \
            -testSuitePath="Test Suites/TC_LOGIN" \
            -browserType="Chrome (headless)" \
            -executionProfile="default" \
            -apiKey="${{ secrets.KATALON_API_KEY }}" \
            --config -Djava.awt.headless=true

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: katalon-report
          path: Reports/

      - name: Prepare GitHub Pages
        if: always()
        run: |
          mkdir -p public
          if [ -f "Reports/report.html" ]; then
            cp Reports/report.html public/index.html
            echo "Report ready for deployment"
          else
            echo "<h1>Test Report</h1><p>Report not found - check logs</p>" > public/index.html
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: public

  deploy-pages:
    needs: katalon-test
    runs-on: ubuntu-latest
    if: always()

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4