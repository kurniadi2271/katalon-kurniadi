name: Katalon CI - With Error Handling

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  katalon-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libgbm1 libxss1 fonts-liberation

      - name: Download KRE
        run: |
          mkdir -p ~/kre
          cd ~/kre
          wget https://download.katalon.com/11.1.1/Katalon_Studio_Engine_Linux_64-11.1.1.tar.gz
          tar -xzf Katalon_Studio_Engine_Linux_64-11.1.1.tar.gz
          chmod +x Katalon_Studio_Engine_Linux_64-11.1.1/katalonc

      - name: Verify Setup
        run: |
          echo "=== Katalon Path ==="
          ls -la ~/kre/Katalon_Studio_Engine_Linux_64-11.1.1/
          echo ""
          echo "=== Project Structure ==="
          ls -la ${{ github.workspace }}/
          echo ""
          echo "=== Test Suites ==="
          find ${{ github.workspace }} -path "*/Test Suites/*" -type f

      - name: Run Tests
        continue-on-error: true
        run: |
          xvfb-run --auto-servernum \
            ~/kre/Katalon_Studio_Engine_Linux_64-11.1.1/katalonc \
            -noSplash \
            -runMode=console \
            -consoleLog \
            -projectPath="${{ github.workspace }}/tugas6-katalon.prj" \
            -testSuitePath="Test Suites/TC_LOGIN" \
            -browserType="Chrome (headless)" \
            -executionProfile="default" \
            -apiKey="${{ secrets.KATALON_API_KEY }}" \
            --config -webui.autoUpdateDrivers=true -Dkatalon.ignore_ssl=true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            Reports/
            .katalon/