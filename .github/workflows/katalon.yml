name: Katalon CI/CD

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  katalon-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: browser-actions/setup-chrome@v1

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb libgtk-3-0 libgbm1 libxss1

      - run: |
          mkdir -p ~/.kre
          cd ~/.kre
          wget -q https://download.katalon.com/11.1.1/Katalon_Studio_Engine_Linux_64-11.1.1.tar.gz
          tar -xzf *.tar.gz
          rm -f *.tar.gz

      # ⭐ KEY STEP: Rebuild Project Cache
      - name: 🔄 Rebuild Project Index
        run: |
          echo "Rebuilding project cache..."
          xvfb-run ~/.kre/Katalon_Studio_Engine_Linux_64-11.1.1/katalonc \
            -noSplash \
            -runMode=console \
            -projectPath="$GITHUB_WORKSPACE/tugas6-katalon.prj" \
            --config -Dkatalon.verify.test.suites=true
        env:
          DISPLAY: :99
        continue-on-error: true

      # ⭐ Main Test Run
      - name: 🧪 Run Katalon Test
        run: |
          xvfb-run ~/.kre/Katalon_Studio_Engine_Linux_64-11.1.1/katalonc \
            -noSplash \
            -runMode=console \
            -consoleLog \
            -projectPath="$GITHUB_WORKSPACE/tugas6-katalon.prj" \
            -testSuitePath="Test Suites/TC_LOGIN" \
            -browserType="Chrome (headless)" \
            -executionProfile="default" \
            -apiKey="${{ secrets.KATALON_API_KEY }}" \
            -Dkatalon.ignore_ssl=true
        env:
          DISPLAY: :99
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports
          path: Reports/

      - run: |
          mkdir -p public
          if [ -f "Reports/report.html" ]; then
            cp Reports/report.html public/index.html
          else
            echo "<h1>✓ Test Executed</h1>" > public/index.html
          fi

      - uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: public

      - uses: actions/deploy-pages@v4
        if: always()